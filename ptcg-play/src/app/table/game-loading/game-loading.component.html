<div class="game-loading-overlay">
  <!-- Sci-fi grid background -->
  <div class="game-loading-bg"></div>

  <!-- Loading content -->
  <div class="game-loading-content">
    <!-- Custom energy-inspired loading animation -->
    <div class="game-loading-spinner">
      <div class="game-loading-dot"></div>
      <div class="game-loading-dot"></div>
      <div class="game-loading-dot"></div>
      <div class="game-loading-dot"></div>
      <div class="game-loading-dot"></div>
    </div>
    <p class="game-loading-message">{{ message || ('LOADING_GAME' | translate) }}</p>
    <p class="game-loading-subtext" translate>LOADING_GAME_SUBTEXT</p>
  </div>

  <!-- Subtle corner accents -->
  <div class="game-loading-corner game-loading-corner-tl"></div>
  <div class="game-loading-corner game-loading-corner-br"></div>
</div>
