<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twinleaf Local</title>
    <script>
      (() => {
        try {
          const storedPreference = localStorage.getItem('twinleaf.theme');
          const preference = storedPreference === 'dark' || storedPreference === 'light' || storedPreference === 'system'
            ? storedPreference
            : 'system';
          const theme = preference === 'dark' || preference === 'light'
            ? preference
            : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
          document.documentElement.dataset.themePreference = preference;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = 'light';
          document.documentElement.dataset.themePreference = 'system';
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
